; ==========================================================
; Open the doors
; 
; ==========================================================

; --- Courtyard Exit - Right ---
modify:
{
	match:
	{	
		"classname" "func_door_rotating"
        "origin" "773 736 236"
	}
	replace:
	{
	    "spawnflags" "1040"
	}		
    insert:
	{
	    "wait" "5"
	}	
}

; --- Courtyard Exit - Left ---
modify:
{
	match:
	{	
		"classname" "func_door_rotating"
        "origin" "709 1384 172"
	}
	replace:
	{
	    "spawnflags" "1040"
	}		
    insert:
	{
	    "wait" "5"
	}	
}

; --- Axis Spawn Door - Right ---
modify:
{
	match:
	{	
		"classname" "func_door_rotating"
        "origin" "1609 1451 864"
	}
	replace:
	{
	    "spawnflags" "1042"
	}		
    insert:
	{
	    "wait" "1"
	}	
}

; --- Axis Spawn Door - Left ---
modify:
{
	match:
	{	
		"classname" "func_door_rotating"
        "origin" "1719 1451 864"
	}
	replace:
	{
	    "spawnflags" "1040"
	}		
    insert:
	{
	    "wait" "1"
	}	
}


; --- Make better point_viewcontrol ---
modify:
{
	match:
	{	
		"classname" "point_viewcontrol"
	}
	replace:
	{
	    	"origin" "2119.946045 -105.236359 975.973816"
            "angles" "38.543938 159.593719 0.000000"
	}	
}


; --- Add mortar reload sound ---
modify:
{
	match:
	{	
		"classname" "func_button"
		"hammerid" "28852"
		"targetname" "Mortier1"
	}
	insert:
	{
	    "OnPressed" "mortar_loadsnd,PlaySound,,9.5,-1"
	}	
}

add:
{
	"origin" "333.43 -472.06 -221.57"
	"message" "dnagames/mortarload.wav"
	"targetname" "mortar_loadsnd"
	"spawnflags" "48"
	"radius" "2500"
	"pitchstart" "100"
	"pitch" "100"
	"health" "10"
	"classname" "ambient_generic"
}


; --- Add flag cap voices ---
modify:
{
	match:
	{	
		"targetname" "flag5"
		"classname" "dod_control_point"
		"hammerid" "13343"
	}
	insert:
	{
		"point_axis_capsound" "Voice.German_Clear"
		"point_allies_capsound" "Voice.US_Flags"
	}	
}

