; 7. Cleanup: Kill all logic and teleport entities when grate_bomb2 explodes
modify:
{
    match:
    {
        "targetname" "grate_bomb2"
        "classname" "dod_bomb_target"
    }
    insert:
    {
        "OnBombExploded" "axis_spawn_trigger,Kill,,0,-1"
        "OnBombExploded" "axis_spawn_master,Kill,,0,-1"
        "OnBombExploded" "axis_spawn_group_A,Kill,,0,-1"
        "OnBombExploded" "axis_spawn_group_B,Kill,,0,-1"
        "OnBombExploded" "pt_*,Kill,,0,-1"
    }
}