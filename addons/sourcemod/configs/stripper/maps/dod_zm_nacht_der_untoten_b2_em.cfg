; ==========================================================
; Make wood fence props indestructible
; Bots were attempting to destroy fences with health 10000
; Setting health to 0 makes props indestructible
; ==========================================================
modify:
{
	match:
	{	
		"model" "models/props_wasteland/wood_fence01a.mdl"
	}
	replace:
	{
		"health" "0"
	}
}