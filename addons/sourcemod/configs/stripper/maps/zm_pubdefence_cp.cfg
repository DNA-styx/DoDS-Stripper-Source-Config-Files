; ==========================================================
; Helper filter so only zombie can damage some items
; This allows "damagefilter" "zombie_only" to be applied
;  
; ==========================================================
modify:
{
	"targetname" "zombie_only"
	"Negated" "Allow entities that match criteria"
	"filterteam" "3"
	"classname" "filter_activator_team"
}

; - Door - 
modify:
{
	match:
	{	
        "classname" "func_breakable"
        "hammerid" "573"
        "propdata" "4"
	}
	replace:
	{
	    "propdata" "0"
        "health" "1000"
	}
	insert:
	{
	    "damagefilter" "zombie_only"
	}		
}

; - Inner Planks - Make them break last
modify:
{
	match:
	{	
		"model" "/^\*1[789]$/"
	}
	replace:
	{
        "propdata" "0"
        "health" "4000"
	}		
	insert:
	{
	    "damagefilter" "zombie_only"
	}
}

