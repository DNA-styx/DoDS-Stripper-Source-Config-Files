; ==========================================================
; MAP Name: dod_rommel_b1
; DOWNLOAD: https://gamebanana.com/mods/64609
;
; PURPOSE:
;   - Misc Tweaks
;	- 
;
; NOTES:
;   - n/a
; ==========================================================

; ==========================================================
; Misc Tweaks
; 
; ==========================================================

; Stop alarm after 120 seconds
add:
{
	"origin" "0 0 0"
	"targetname" "alarm_silencer"
	"classname" "logic_auto"
	"spawnflags" "1"
	"OnMultiNewRound" "alarme,Kill,,120,-1"
}


; ==========================================================
; Axis Spawn in forward positions until all flak guns are captured
; ==========================================================

; Rename Forward Axis Spawns (Y coordinate 500-999)
modify:
{
	match:
	{
		"classname" "info_player_axis"
		"origin" "/-?[0-9.]+ [5-9][0-9]{2} -?[0-9.]+/"
	}
	insert:
	{
		"targetname" "axis_spawn_forward"
	}
}

; Rename Rear Axis Spawns (Y coordinate 4000+)
modify:
{
	match:
	{
		"classname" "info_player_axis"
		"origin" "/-?[0-9.]+ 4[0-9]{3} -?[0-9.]+/"
	}
	insert:
	{
		"targetname" "axis_spawn_rear"
	}
}

; ==========================================================
; Logic and Controls
; ==========================================================

; Add Counter to track 3 Flak destructions
add:
{
	"origin" "0 0 0"
	"targetname" "flak_counter"
	"classname" "math_counter"
	"startvalue" "0"
	"min" "0"
	"max" "3"
	"OnHitMax" "spawn_ctrl_forward,Disable,,0,-1"
	"OnHitMax" "spawn_ctrl_rear,Enable,,0,-1"
}

; Spawn Control for Forward Group (Active at start)
add:
{
	"origin" "0 0 0"
	"targetname" "spawn_ctrl_forward"
	"classname" "info_spawn_control"
	"spawncontrolteam" "2"
	"spawncontrolname" "axis_spawn_forward"
	"StartDisabled" "0"
}

; Spawn Control for Rear Group (Disabled at start)
add:
{
	"origin" "0 0 0"
	"targetname" "spawn_ctrl_rear"
	"classname" "info_spawn_control"
	"spawncontrolteam" "2"
	"spawncontrolname" "axis_spawn_rear"
	"StartDisabled" "1"
}

; Ensure initial state on every round start
modify:
{
	match:
	{
		"targetname" "alarm_silencer"
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMultiNewRound" "flak_counter,SetValue,0,0,-1"
		"OnMultiNewRound" "spawn_ctrl_forward,Enable,,0,-1"
		"OnMultiNewRound" "spawn_ctrl_rear,Disable,,0,-1"
	}
}

; ==========================================================
; Hook Bomb Targets
; ==========================================================

; Add counter increment to the three Flak targets
modify:
{
	match:
	{
		"targetname" "Target_Flak_Left"
		"classname" "dod_bomb_target"
	}
	insert:
	{
		"OnBombExploded" "flak_counter,Add,1,0,-1"
	}
}

modify:
{
	match:
	{
		"targetname" "Target_Flak_Middle"
		"classname" "dod_bomb_target"
	}
	insert:
	{
		"OnBombExploded" "flak_counter,Add,1,0,-1"
	}
}

modify:
{
	match:
	{
		"targetname" "Target_Flak_Right"
		"classname" "dod_bomb_target"
	}
	insert:
	{
		"OnBombExploded" "flak_counter,Add,1,0,-1"
	}
}