; ==========================================================
; Misc. tweaks
; 
; ==========================================================

; --- Increase time limit ---
modify:
{
	match:
	{	
		"hammerid" "361008"
		"classname" "dod_control_point_master"
	}
	replace:
	{
	    "cpm_timer_length" "900"
	    "cpm_use_timer" "1"
	}		
}

; --- Turn off adverts ---
modify:
{
	match:
	{	
		"classname" "logic_timer"
		"hammerid" "331961"
	}
	replace:
	{
	    "StartDisabled" "1"
	}		
}

; --- Remove Allied spawns inside wire. ---
remove:
{
   "targetname" "info_player_allied_spawn2"
}


; --- Remove Bomb Dispensers from Guns ---
remove:
{
    "model" "*5"
    "StartDisabled" "0"
    "dispense_team" "2"
    "classname" "dod_bomb_dispenser"
    "hammerid" "380110"
}
remove:
{
    "model" "*6"
    "StartDisabled" "0"
    "dispense_team" "2"
    "classname" "dod_bomb_dispenser"
    "hammerid" "380178"
}


