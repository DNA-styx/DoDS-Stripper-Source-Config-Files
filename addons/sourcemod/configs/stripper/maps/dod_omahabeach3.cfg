; ==========================================================
; Add smoke to Bangalores on beach
; 
; ==========================================================

; --- Right Wire ---
modify:
{
	match:
	{	
	    "hammerid" "344095"
	}
	insert:
	{
	    "OnPass" "barbwire_right_smoke,TurnOff,,5,1"
	    "OnPass" "blow_the_wire,disable,,0,1"
	}
}

add:
{
	"targetname" "barbwire_right_smoke"
	"origin" "1666.563965 -2314.388672 -158.710861"
	"WindSpeed" "20"
	"WindAngle" "12"
	"twist" "2"
	"StartSize" "20"
	"SpreadSpeed" "15"
	"Speed" "40"
