; ==========================================================
; MAP NAME: dod_omahabeach3
; DOWNLOAD: https://gamebanana.com/mods/65747
;
; PURPOSE:
;   - Create touch triggers to open doors
;   - Set time limit
;   - Turn off in game adverts
;	- Add touch triggers to Bangalores
;	- Add smoke to Bangalores to help find them
;
; NOTES:
;   - n/a
; ==========================================================

; ==========================================================
; Add touch triggers to Bangalores on beach
; 
; ==========================================================

; --- Barbwire Right - Enable Proximity Trigger ---

; Ensure the button is named so the trigger can activate it
modify:
{
    match:
    {
        "hammerid" "344027"
    }
    insert:
    {
        "targetname" "btn_barbwire_right"
    }
}

; Proximity trigger for barbwire interaction (Chest Height)
add:
{
    "model" "*10"
    "targetname" "trig_barbwire_right"
    "classname" "trigger_multiple"
    "origin" "1658.80 -2343.04 -110"
    "spawnflags" "1"
    "wait" "3"
    "StartDisabled" "0"
    "OnStartTouch" "btn_barbwire_right,Press,,0,1"
}

