;;Remove buggy smoke
remove:
{
   "classname" "env_smoketrail"
}

; ==========================================================
; Add tic points to flags
; 
; ==========================================================

modify:
{
    match:
    {
        "classname" "dod_control_point"
        "point_timedpoints_axis" "0"
        "point_timedpoints_allies" "0"
    }
    replace:
    {
        "point_timedpoints_axis" "1"
        "point_timedpoints_allies" "1"
    }
}