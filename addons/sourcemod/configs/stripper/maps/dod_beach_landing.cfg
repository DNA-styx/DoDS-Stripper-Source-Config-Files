; ==========================================================
; MAP Name: dod_beach_landing
;
; PURPOSE:
;   - Repair broken Output syntax on all flags
;   - Fix Axis Rear Spawn (AXIS1) initialization bug
;   - Reduce screen shake/damage from beach explosions
;   - Add capture sounds and proper HUD names
;
; NOTES:
;   - Uses logic_auto workaround for info_player_axis bug.
;   - Explosion magnitude reduced to 10 to prevent "insta-kills".
; ==========================================================


; ==========================================================
; GLOBAL MAP ADJUSTMENTS
; Changes affecting all entities of a specific class
; ==========================================================

; --- Add Capture Sounds to all flags ---
modify:
{
    match:
    {   
        "classname" "dod_control_point"
    }
    insert:
    {
        "point_allies_capsound" "Voice.US_FlagCapture"
        "point_axis_capsound" "Voice.German_FlagCapture"
    }
}

; --- Reduce Explosion Severity ---
; Lowers iMagnitude to 10 to reduce damage and screen shake
modify:
{
    match:
    {   
        "classname" "env_explosion"
    }
    replace:
    {
        "iMagnitude" "10"
    }
}

; --- Reduce Explosion Frequency ---
; Increases the delay between random beach explosions
modify:
{
    match:
    {   
        "classname" "logic_timer"
    }
    replace:
    {
        "UpperRandomBound" "250"
        "LowerRandomBound" "1"
    }
}


; ==========================================================
; SPAWN SYSTEM WORKAROUNDS
; Logic to handle the Day of Defeat: Source spawn bugs
; ==========================================================

; --- Repair AXIS1 (Rear Spawn) ---
; We remove 'StartDisabled' so the engine initializes the entity properly.
modify:
{
    match:
    {
        "classname" "info_player_axis"
        "targetname" "AXIS1"
    }
    delete:
    {
        "StartDisabled" "1"
    }
}

; --- Disable AXIS1 on Map Start ---
; Now that the entity is "healthy", we put it to sleep until Flag 3 is capped.
add:
{
    "classname" "logic_auto"
    "spawnflags" "1"
    "OnMapSpawn" "AXIS1,Disable,,0,-1"
}


; ==========================================================
; OBJECTIVES & HUD NAMES
; Flag-specific logic, blockers, and naming
; ==========================================================

; --- Objective 1: East Flag (flag1) ---
; Renames flag and kills beach blockers upon capture
modify:
{
    match:
    {   
        "targetname" "flag1"
        "classname" "dod_control_point"
    }
    delete:
    {
        "AlliesCapturePoint" "blocker1,Kill,,0,-1"
    }
    insert:
    {
        "OnAlliesCap" "blocker1,Kill,,0,-1"
    }
    replace:
    {
        "point_printname" "East Flag"
    }
}

; --- Objective 2: West Flag (flag2) ---
; Renames flag and kills beach blockers upon capture
modify:
{
    match:
    {   
        "targetname" "flag2"
        "classname" "dod_control_point"
    }
    delete:
    {
        "AlliesCapturePoint" "blocker2,Kill,,0,-1"
    }
    insert:
    {
        "OnAlliesCap" "blocker2,Kill,,0,-1"
    }
    replace:
    {
        "point_printname" "West Flag"
    }
}

; --- Objective 3: Middle Flag (flag3) ---
; Renames flag and swaps Axis spawns from Beach to Bunker
modify:
{
    match:
    {
        "targetname" "flag3"
        "classname" "dod_control_point"
    }
    delete:
    {
        "AlliesCapturePoint" "AXIS1,Enable,,0,-1"
    }
    insert:
    {
        "OnAlliesCap" "AXIS2,Disable,,0,-1"
        "OnAlliesCap" "AXIS1,Enable,,0,-1"
    }
    replace:
    {
        "point_printname" "Middle Flag"
    }
}

; --- Objective 4: Axis Mortars (X_Base) ---
; Adjusts capture requirements and HUD name
modify:
{
    match:
    {   
        "targetname" "X_Base"
        "classname" "dod_control_point"
    }
    replace:
    {
        "point_printname" "Axis Mortars"
    }
}

modify:
{
    match:
    {
        "classname" "dod_capture_area"
        "area_cap_point" "X_Base"
    }
    replace:
    {
        "area_axis_numcap" "3"
    }
}


; ==========================================================
; VISUALS & CAMERAS
; Cinematic and atmospheric additions
; ==========================================================

; --- Add Round-Start Camera ---
add:
{
    "origin" "-51.387558 1233.948242 359.868744"
    "targetname" "intro_cam"
    "wait" "5"
    "spawnflags" "3"
    "deceleration" "500"
    "angles" "24.376028 89.159943 0.000000"
    "acceleration" "500"
    "classname" "point_viewcontrol"
}