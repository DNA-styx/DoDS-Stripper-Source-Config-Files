; ==========================================================
; Helper filter so only zombie can damage some items
; This allows "damagefilter" "zombie_only" to be applied
;  
; ==========================================================
modify:
{
	"targetname" "zombie_only"
	"Negated" "Allow entities that match criteria"
	"filterteam" "3"
	"classname" "filter_activator_team"
}

