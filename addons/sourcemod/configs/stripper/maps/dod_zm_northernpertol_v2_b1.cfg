; ==========================================================
; 
; Misc Fix
;  
; ==========================================================

; 1. Fix Audio and Add Outputs for Garage Door 1
modify:
{
    match:
    {   
        "targetname" "garage_door1"
        "classname" "func_door"
    }
    replace:
    {
        "loopmovesound" "0"
        "noise1" ""
        "startclosesound" ""
    }
    insert:
    {
        "OnOpen" "garage_sound_loop1,PlaySound,,0,-1"
        "OnClose" "garage_sound_loop1,PlaySound,,0,-1"
        ; Stops the loop and instantly triggers the stop "clunk" sound
        "OnFullyOpen" "garage_sound_loop1,StopSound,,0,-1"
        "OnFullyOpen" "garage_sound_stop1,PlaySound,,0,-1"
        "OnFullyClosed" "garage_sound_loop1,StopSound,,0,-1"
        "OnFullyClosed" "garage_sound_stop1,PlaySound,,0,-1"
    }
}

; 2. Fix Audio and Add Outputs for Garage Door 2
modify:
{
    match:
    {   
        "targetname" "garage_door2"
        "classname" "func_door"
    }
    replace:
    {
        "loopmovesound" "0"
        "noise1" ""
        "startclosesound" ""
    }
    insert:
    {
        "OnOpen" "garage_sound_loop2,PlaySound,,0,-1"
        "OnClose" "garage_sound_loop2,PlaySound,,0,-1"
        ; Stops the loop and instantly triggers the stop "clunk" sound
        "OnFullyOpen" "garage_sound_loop2,StopSound,,0,-1"
        "OnFullyOpen" "garage_sound_stop2,PlaySound,,0,-1"
        "OnFullyClosed" "garage_sound_loop2,StopSound,,0,-1"
        "OnFullyClosed" "garage_sound_stop2,PlaySound,,0,-1"
    }
}

; 3. Moving Sound Entities (Loops)
